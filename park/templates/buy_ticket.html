{% extends "base.html" %}
{% block title %}Купить билет — Парк Развлечений{% endblock %}
{% block content %}
<div class="max-w-5xl mx-auto px-6 pt-16 pb-20">
    <div class="text-center mb-16">
        <h2 class="text-4xl font-extrabold text-slate-900 mb-4 text-center">Выберите ваш тариф</h2>
        <p class="text-slate-500 max-w-lg mx-auto leading-relaxed">Мгновенный доступ ко всем развлечениям парка сразу после оплаты.</p>
    </div>
    <form method="POST">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            <!-- Тариф Стандарт -->
            <label class="relative cursor-pointer group">
                <input type="radio" name="ticket_type" value="standard" class="peer hidden" checked>
                <div class="h-full bg-white p-10 rounded-[3rem] border-2 border-slate-100 peer-checked:border-indigo-600 peer-checked:bg-indigo-50/30 transition-all duration-300 shadow-sm hover:shadow-xl">
                    <div class="flex justify-between items-center mb-8">
                        <div class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                            <i class="fas fa-ticket"></i>
                        </div>
                        <div class="text-right">
                            <span class="text-3xl font-extrabold text-slate-900">1 500 ₽</span>
                        </div>
                    </div>
                    <h3 class="text-2xl font-bold mb-4 text-slate-900">Стандарт</h3>
                    <p class="text-slate-500 text-sm mb-8">Идеальный выбор для быстрого знакомства с основными зонами парка.</p>
                    <ul class="space-y-4">
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-600">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            Все базовые аттракционы
                        </li>
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-600">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            4 часа пребывания
                        </li>
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-400 opacity-50">
                            <i class="fas fa-times-circle text-rose-300"></i>
                            Доступ FastPass
                        </li>
                    </ul>
                    <div class="mt-10 py-4 w-full bg-slate-900 text-white text-center rounded-2xl font-bold peer-checked:bg-indigo-600">Выбрано</div>
                </div>
            </label>
            <!-- Тариф Безлимит -->
            <label class="relative cursor-pointer group">
                <input type="radio" name="ticket_type" value="premium" class="peer hidden">
                <div class="h-full bg-white p-10 rounded-[3rem] border-2 border-slate-100 peer-checked:border-rose-500 peer-checked:bg-rose-50/30 transition-all duration-300 shadow-sm hover:shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-rose-500 text-white text-[10px] font-extrabold uppercase px-6 py-2 rotate-45 translate-x-6 translate-y-3">Best</div>
                    <div class="flex justify-between items-center mb-8">
                        <div class="w-14 h-14 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                            <i class="fas fa-crown"></i>
                        </div>
                        <div class="text-right">
                            <span class="text-3xl font-extrabold text-slate-900">3 200 ₽</span>
                        </div>
                    </div>
                    <h3 class="text-2xl font-bold mb-4 text-slate-900">Безлимит</h3>
                    <p class="text-slate-500 text-sm mb-8">Максимальный комфорт без ограничений по времени и очередям.</p>
                    <ul class="space-y-4">
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-600">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            Все аттракционы (вкл. Extreme)
                        </li>
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-600">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            Весь день в парке
                        </li>
                        <li class="flex items-center gap-3 text-sm font-medium text-slate-600">
                            <i class="fas fa-check-circle text-emerald-500"></i>
                            <b>FastPass</b> без очередей
                        </li>
                    </ul>
                    <div class="mt-10 py-4 w-full bg-slate-100 text-slate-900 text-center rounded-2xl font-bold peer-checked:bg-rose-500 peer-checked:text-white transition-colors">Выбрать</div>
                </div>
            </label>
        </div>
        <div class="mt-16 text-center">
            <button type="submit" class="inline-flex items-center gap-4 bg-indigo-600 text-white px-12 py-5 rounded-3xl font-extrabold text-xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-100 hover:-translate-y-1">
                Подтвердить покупку
                <i class="fas fa-arrow-right"></i>
            </button>
            <p class="mt-6 text-slate-400 text-xs">Нажимая кнопку, вы соглашаетесь с правилами посещения парка.</p>
        </div>
    </form>
</div>
{% endblock %}
