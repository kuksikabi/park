{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h1>🎫 Купить билет</h1>

    <form method="POST" class="mt-4">
        <div class="row">
            <!-- Standard -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-body text-center">
                        <h3>Standard</h3>
                        <p>Базовый доступ: классика + приключения</p>
                        <h4 class="text-primary">500 ₽</h4>
                        <p class="text-muted">⏱ 4 часа</p>
                        <button type="submit" name="ticket_type" value="standard"
                                class="btn btn-primary">
                            Выбрать
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIP -->
            <div class="col-md-4">
                <div class="card mb-4 border-success">
                    <div class="card-body text-center">
                        <h3>VIP</h3>
                        <p>Расширенный доступ + экстрим</p>
                        <h4 class="text-success">1000 ₽</h4>
                        <p class="text-muted">⏱ Безлимит</p>
                        <button type="submit" name="ticket_type" value="vip"
                                class="btn btn-success">
                            Выбрать
                        </button>
                    </div>
                </div>
            </div>

            <!-- Platinum -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-body text-center">
                        <h3>Platinum</h3>
                        <p>Полный доступ без ограничений</p>
                        <h4 class="text-warning">1500 ₽</h4>
                        <p class="text-muted">⏱ Безлимит + приоритет</p>
                        <button type="submit" name="ticket_type" value="platinum"
                                class="btn btn-warning">
                            Выбрать
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <a href="/" class="btn btn-secondary">← На главную</a>
</div>
{% endblock %}
